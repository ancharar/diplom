version: '3.9'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${DB_NAME:-scientific_pm}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  mongodb:
    image: mongo:6
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  backend:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py create_mongo_indexes &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
      - media_data:/app/media
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DB_HOST: postgres
      MONGO_HOST: mongodb
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - mongodb

volumes:
  postgres_data:
  mongo_data:
  media_data:
